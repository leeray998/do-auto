name: DO_Cleanup_Task

on:
  workflow_dispatch:
  schedule:
    - cron: '57 * * * *'

jobs:
  cleanup_droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Dynamic Check and Destroy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. 动态获取当前正在运行的 minidrop 的 IP 和 ID
          # 这样就不需要写死 IP 了
          DROPLET_INFO=$(doctl compute droplet list --format "ID,PublicIPv4,Name" --no-header | grep "minidrop")
          ID=$(echo $DROPLET_INFO | awk '{print $1}')
          IP=$(echo $DROPLET_INFO | awk '{print $2}')
          
          if [ -z "$ID" ]; then 
            echo "无服务器运行，结束。"
            exit 0
          fi

          # 2. 准备 SSH 密钥
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 3. 智能检测逻辑 (SSH 连进去检查进程和流量)
          # 注意：这里增加了一个超时限制，防止机器卡死导致 GitHub Action 挂起
          IS_BUSY=$(ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@$IP "
            SUI_RUNNING=\$(systemctl is-active s-ui)
            # 检查是否有除 SSH 以外的活动连接 (过滤掉 22 端口)
            CONNECTIONS=\$(ss -ntu | grep -v '22' | grep 'ESTAB' | wc -l)
            if [ \"\$SUI_RUNNING\" == \"active\" ] || [ \"\$CONNECTIONS\" -gt 0 ]; then
              echo 'YES'
            else
              echo 'NO'
            fi
          " 2>/dev/null || echo "YES") # 如果 SSH 连不上，默认认为忙碌/锁定，防止误删

          # 4. 逻辑判断与 Telegram 通知
          if [ "$IS_BUSY" == "YES" ]; then
            curl -s -X POST https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage \
              -d chat_id=$TG_CHAT_ID -d text="⏳ 检测到 IP $IP 正在活动 (s-ui 或有流量)，已延后一小时。"
            exit 0
          else
            curl -s -X POST https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage \
              -d chat_id=$TG_CHAT_ID -d text="✅ IP $IP 空闲，正在执行删除..."
            doctl compute droplet delete $ID --force
            curl -s -X POST https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage \
              -d chat_id=$TG_CHAT_ID -d text="🗑️ 服务器 $IP 删除成功。"
          fi
