name: DO_Cleanup_Task

on:
  workflow_dispatch: # 允许你随时从 GitHub 页面手动点击运行
  schedule:
    - cron: '57 * * * *' # 每小时的 57 分自动运行检查

jobs:
  cleanup_droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Check Usage and Destroy
        run: |
          # 1. 获取 Droplet IP (假设你的Droplet名字是 minidrop)
          IP=$(doctl compute droplet list --format "PublicIPv4,Name" --no-header | grep "minidrop" | awk '{print $1}')
          
          if [ -z "$IP" ]; then
            echo "✅ 无 minidrop 存在，无需清理。"
            exit 0
          fi

          # 2. 通过 SSH 检查是否有 in_use.lock 文件 (这是最稳妥的防删逻辑)
          # 注意：你需要确保你的 VPS 上有这个文件，或者改用 SSH 执行 netstat/ss 命令查看流量
          SSH_CHECK=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@$IP "[ -f /root/in_use.lock ] && echo 'BUSY' || echo 'FREE'")
          
          if [ "$SSH_CHECK" == "BUSY" ]; then
             echo "⚠️ 监测到使用中 (in_use.lock)，跳过删除。"
             curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
               -d chat_id=${{ secrets.TG_CHAT_ID }} \
               -d text="⏳ 正在使用中，自动跳过删除任务。"
             exit 0
          fi

          # 3. 如果没在使用，执行销毁
          ID=$(doctl compute droplet list --format "ID,Name" --no-header | grep "minidrop" | awk '{print $1}')
          doctl compute droplet delete $ID --force
          echo "✅ 成功销毁服务器。"
