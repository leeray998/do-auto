name: DO_Cleanup_Task
on:
  workflow_dispatch:
  schedule:
    - cron: '57 * * * *' # 每小時執行一次

jobs:
  cleanup_droplet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with: { token: ${{ secrets.DO_TOKEN }} }

      - name: Check Usage and Manage
        run: |
          # 1. 初始化計數器檔案 (如果沒有的話)
          [ ! -f delay_count.txt ] && echo "0" > delay_count.txt
          COUNT=$(cat delay_count.txt)
          
          # 2. 檢查 VPS 是否使用中
          # 使用 SSH 檢查鎖定檔 (你之前的邏輯)
          IS_BUSY=$(ssh -o StrictHostKeyChecking=no -i id_rsa root@$(...) "[ -f /root/in_use.lock ] && echo 'YES' || echo 'NO'")

          # 3. 核心邏輯：判斷延遲還是強制刪除
          if [ "$IS_BUSY" == "YES" ]; then
             if [ "$COUNT" -lt 1 ]; then
               # 第一次檢測到使用，延後 1 小時
               NEW_COUNT=$((COUNT + 1))
               echo $NEW_COUNT > delay_count.txt
               echo "⚠️ 檢測到使用，延後第 $NEW_COUNT 次 (共允許延後 1 次)。"
               exit 0 
             else
               # 已經延後過，強制刪除
               echo "🚨 延後時間已到，強制刪除！"
               doctl compute droplet delete $(...) --force
               echo "0" > delay_count.txt
             fi
          else
             # 沒有在使用，正常刪除並重置計數
             doctl compute droplet delete $(...) --force
             echo "0" > delay_count.txt
          fi
          
          # 注意：你需要將 delay_count.txt 提交回倉庫才能記錄狀態
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add delay_count.txt
          git commit -m "Update delay count"
          git push
