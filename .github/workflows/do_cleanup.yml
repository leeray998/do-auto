name: DO_Cleanup_Task

on:
  workflow_dispatch:
  schedule:
    - cron: '57 * * * *'

jobs:
  cleanup_droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Check and Destroy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 1. 獲取 Droplet ID 和 IP
          ID=$(doctl compute droplet list --format "ID,Name" --no-header | grep "minidrop" | awk '{print $1}')
          IP=$(doctl compute droplet list --format "PublicIPv4,Name" --no-header | grep "minidrop" | awk '{print $1}')
          
          if [ -z "$ID" ]; then 
            echo "無服務器，結束。"
            exit 0
          fi

          # 2. 設置 SSH 環境
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 3. 檢查鎖定檔
          IS_BUSY=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@$IP "[ -f /root/in_use.lock ] && echo 'YES' || echo 'NO'")

          # 4. 處理計數器檔案
          [ ! -f delay_count.txt ] && echo "0" > delay_count.txt
          COUNT=$(cat delay_count.txt)

          # 5. 邏輯判斷與通知
          if [ "$IS_BUSY" == "YES" ]; then
            if [ "$COUNT" -lt 1 ]; then
              echo 1 > delay_count.txt
              curl -s -X POST https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage \
                -d chat_id=$TG_CHAT_ID -d text="⏳ 檢測到服務器正在活動中，已延後一小時進行刪除。"
              exit 0
            else
              curl -s -X POST https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage \
                -d chat_id=$TG_CHAT_ID -d text="🚨 延後時間已到，正在強制刪除服務器..."
              doctl compute droplet delete $ID --force
              echo "0" > delay_count.txt
            fi
          else
            curl -s -X POST https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage \
              -d chat_id=$TG_CHAT_ID -d text="✅ 服務器閒置，刪除成功。"
            doctl compute droplet delete $ID --force
            echo "0" > delay_count.txt
          fi

          # 6. 同步計數器
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add delay_count.txt
          git commit -m "Update delay count" || echo "No changes to commit"
          git push
