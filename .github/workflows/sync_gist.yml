- name: Combine and Update Gist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          MY_UUID: ${{ secrets.MY_UUID }}
        run: |
          IP=${{ env.NEW_IP }}
          echo "📍 正在为 IP $IP 生成加密订阅内容..."
          
          # 1. 先生成明文内容
          RAW_CONTENT="vless://${MY_UUID}@${IP}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni=iosapps.itunes.apple.com&fp=edge&pbk=PdJjph4YO4F3zRfLdAFHgWaUnNYbSKVOKt1ifPJHI2s&type=tcp&headerType=none#DO-Reality"

          # 2. 【核心修改】将明文内容转为 Base64 编码 (增加安全性)
          # -w 0 确保编码后的内容是一整行，不会断行
          B64_CONTENT=$(echo -n "$RAW_CONTENT" | base64 -w 0)

          # 3. 将加密后的内容写入 Gist
          jq -n --arg ip "$IP" --arg sub "$B64_CONTENT" \
            '{files: {"ip.txt": {content: $ip}, "sub.txt": {content: $sub}}}' > payload.json
          
          curl -L -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/$GIST_ID -d @payload.json
          
          echo "✅ Gist 更新成功！sub.txt 现在已是加密状态。"
