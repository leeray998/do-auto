name: Sync_Gist_Update

on:
  workflow_run:
    workflows: ["DO_Control_Pipeline_V2"]
    types: [completed]
  workflow_dispatch:
    inputs:
      manual_ip:
        description: '手动输入 IP (可选)'
        required: false

jobs:
  update_gist:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Target IP
        id: get_ip
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ ! -z "${{ github.event.inputs.manual_ip }}" ]; then
            echo "IP=${{ github.event.inputs.manual_ip }}" >> $GITHUB_ENV
          else
            echo "📡 正在从 DigitalOcean 获取最新 IP..."
            curl -sL https://github.com/digitalocean/doctl/releases/download/v1.101.0/doctl-1.101.0-linux-amd64.tar.gz | tar xz
            ./doctl compute droplet list --format "PublicIPv4,Name" --no-header --access-token ${{ secrets.DO_TOKEN }} | grep "minidrop" | awk '{print $1}' > ip_result.txt
            IP_ADDR=$(cat ip_result.txt)
            if [ -z "$IP_ADDR" ]; then echo "❌ 未找到名为 minidrop 的服务器"; exit 1; fi
            echo "IP=$IP_ADDR" >> $GITHUB_ENV
          fi

      - name: Process and Sync
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          NEW_IP=${{ env.IP }}
          echo "📍 目标 IP: $NEW_IP"
          
          # 1. 获取当前 Gist 数据 (使用 jq 提取，更稳)
          GIST_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/gists/$GIST_ID")
          OLD_SUB=$(echo "$GIST_JSON" | jq -r '.files["sub.txt"].content')
          
          if [ "$OLD_SUB" == "null" ]; then echo "❌ 无法获取 sub.txt 内容，请检查 GIST_ID"; exit 1; fi

          # 2. 精准替换 IP：只替换 @ 符号之后、端口号 : 之前的 IP 部分，防止破坏 UUID 或端口
          # 正则解释：查找 @ 后面跟着的 IP，并替换，保留前后的 @ 和 :
          NEW_SUB=$(echo "$OLD_SUB" | sed -E "s/(@)([0-9]{1,3}\.){3}[0-9]{1,3}(:)/\1$NEW_IP\3/g")
          
          # 3. 构造上传 Payload
          jq -n --arg ip "$NEW_IP" --arg sub "$NEW_SUB" \
            '{files: {"ip.txt": {content: $ip}, "sub.txt": {content: $sub}}}' > payload.json
          
          # 4. 执行更新
          RESPONSE=$(curl -L -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/$GIST_ID -d @payload.json)
            
          if echo "$RESPONSE" | grep -q "files"; then
            echo "✅ Gist 远程同步成功"
          else
            echo "❌ Gist 同步失败: $RESPONSE"
            exit 1
          fi

      - name: Notify Telegram
        if: always()
        run: |
          # 根据上一步结果发送不同通知
          if [ "${{ job.status }}" == "success" ]; then
            MSG="🔄 Gist 自动同步成功！%0A📍 当前 IP: ${{ env.IP }}%0A📜 订阅链接已指向新服务器。"
          else
            MSG="⚠️ Gist 同步任务失败，请检查 GitHub Actions 日志。"
          fi
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="$MSG"
