name: Sync_Gist_Update

on:
  workflow_run:
    workflows: ["DO_Control_Pipeline_V2"]
    types: [completed]
  workflow_dispatch:
    inputs:
      manual_ip:
        description: '手动输入 IP (手机触发通常留空)'
        required: false

jobs:
  update_gist:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Current IP from DO
        run: |
          echo "📡 正在获取服务器最新 IP..."
          curl -sL https://github.com/digitalocean/doctl/releases/download/v1.101.0/doctl-1.101.0-linux-amd64.tar.gz | tar xz
          ./doctl compute droplet list --format "PublicIPv4,Name" --no-header --access-token ${{ secrets.DO_TOKEN }} | grep "minidrop" | awk '{print $1}' > ip.txt
          echo "NEW_IP=$(cat ip.txt)" >> $GITHUB_ENV

      - name: Update Gist Content
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: "4e15588701f033f0"
        run: |
          # 1. 下载当前 Gist 全量数据
          GIST_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/gists/$GIST_ID")
          
          # 2. 提取 sub.txt (处理 Base64 或特殊字符)
          OLD_SUB=$(echo "$GIST_JSON" | jq -r '.files["sub.txt"].content')
          
          # 3. 【核心修正】使用 Perl 正则精准替换 @ 和 : 之间的地址
          # 这样即便你的 sub.txt 是域名、旧 IP 都能被强制换成新 IP
          NEW_SUB=$(echo "$OLD_SUB" | perl -pe "s/(\@).*?(:)/\$1${{ env.NEW_IP }}\$2/g")
          
          # 4. 构造 Payload 并 PATCH
          # 同时更新 ip.txt (纯 IP) 和 sub.txt (完整链接)
          jq -n --arg ip "${{ env.NEW_IP }}" --arg sub "$NEW_SUB" \
            '{files: {"ip.txt": {content: $ip}, "sub.txt": {content: $sub}}}' > payload.json
          
          curl -s -X PATCH -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d @payload.json "https://api.github.com/gists/$GIST_ID"

      - name: Notify Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="📱 手机端同步指令已完成！%0AGist ID: 4e155887...%0A新 IP: ${{ env.NEW_IP }}%0A请尝试刷新手机订阅。"
