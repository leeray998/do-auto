name: Sync_Gist_Update

on:
  workflow_run:
    workflows: ["DO_Control_Pipeline_V2"]
    types: [completed]
  workflow_dispatch:
    inputs:
      manual_ip:
        description: '手动输入 IP'
        required: false

jobs:
  update_gist:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Target IP
        id: get_ip
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ ! -z "${{ github.event.inputs.manual_ip }}" ]; then
            echo "IP=${{ github.event.inputs.manual_ip }}" >> $GITHUB_ENV
          else
            curl -sL https://github.com/digitalocean/doctl/releases/download/v1.101.0/doctl-1.101.0-linux-amd64.tar.gz | tar xz
            ./doctl compute droplet list --format "PublicIPv4,Name" --no-header --access-token ${{ secrets.DO_TOKEN }} | grep "minidrop" | awk '{print $1}' > ip_result.txt
            echo "IP=$(cat ip_result.txt)" >> $GITHUB_ENV
          fi

      - name: Process and Sync
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # 这里统一引用 Secrets 里的配置
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          NEW_IP=${{ env.IP }}
          echo "📍 目标 IP: $NEW_IP"
          
          # 1. 获取当前 Gist 全量数据
          GIST_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/gists/$GIST_ID")
          
          # 2. 提取 sub.txt (增加容错，防止提取失败)
          OLD_SUB=$(echo "$GIST_JSON" | jq -r '.files["sub.txt"].content // empty')
          
          if [ -z "$OLD_SUB" ]; then
            echo "❌ 错误: 无法从 Gist 读取 sub.txt，请检查文件名和 GIST_ID 权限"
            exit 1
          fi
          
          # 3. 执行全量 IP 替换
          # 使用 perl 替换所有符合 IP 格式的文本
          NEW_SUB=$(echo "$OLD_SUB" | perl -pe "s/(\d{1,3}\.){3}\d{1,3}/$NEW_IP/g")
          
          # 4. 构造 Payload 并 PATCH
          jq -n --arg ip "$NEW_IP" --arg sub "$NEW_SUB" \
            '{files: {"ip.txt": {content: $ip}, "sub.txt": {content: $sub}}}' > payload.json
          
          # 5. 执行更新
          RESPONSE=$(curl -L -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/gists/$GIST_ID -d @payload.json)
            
          # 校验是否包含新 IP
          if echo "$RESPONSE" | grep -q "$NEW_IP"; then
             echo "✅ Gist 更新确认成功"
          else
             echo "❌ API 更新失败，详情: $RESPONSE"
             exit 1
          fi

      - name: Notify Telegram
        run: |
          # 发送通知时附带一个随机参数的 Raw 链接，方便你直接点开验证（绕过缓存）
          RANDOM_ID=$((RANDOM % 9999))
          CHECK_URL="https://gist.githubusercontent.com/${{ github.repository_owner }}/${{ secrets.GIST_ID }}/raw/sub.txt?v=$RANDOM_ID"
          
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="🔄 Gist 同步任务完成！
            
📍 IP: ${{ env.IP }}
🛠 使用 ID: ${{ secrets.GIST_ID }}

🔗 实时验证链接 (请点此查看内容是否改变):
$CHECK_URL"
