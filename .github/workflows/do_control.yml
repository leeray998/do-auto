name: DO_Control_Pipeline_V3

on:
  repository_dispatch:
    types: [do_action]

jobs:
  manage_droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      # --- 功能 1：查询 (保留) ---
      - name: List All Droplets
        if: github.event.client_payload.task == 'list'
        run: |
          LIST=$(doctl compute droplet list --format "Name,PublicIPv4,Status" --no-header)
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="📋 当前服务器清单：$LIST"

      # --- 功能 2：销毁 (保留) ---
      - name: Destroy Droplet
        if: github.event.client_payload.task == 'delete'
        run: |
          ID=$(doctl compute droplet list --format "ID,Name" --no-header | grep "minidrop" | awk '{print $1}')
          [ ! -z "$ID" ] && doctl compute droplet delete $ID --force

      # --- 功能 3：【全新逻辑】创建并自动安装 (Cloud-Init) ---
      - name: Create Droplet with Cloud-Init
        if: github.event.client_payload.task == 'create'
        run: |
          echo "🚀 正在使用 Cloud-Init 模式创建服务器..."
          SSH_ID=$(doctl compute ssh-key list --format ID --no-header | head -n 1)
          
          # 将安装脚本直接写入 User-Data
          # 服务器开机即运行，无需 SSH 等待
          doctl compute droplet create minidrop \
            --region sfo3 \
            --image ubuntu-24-04-x64 \
            --size s-1vcpu-512mb-10gb \
            --ssh-keys $SSH_ID \
            --user-data "#!/bin/bash
            sleep 10
            printf 'y\n\n\n\n' | bash <(curl -Ls https://raw.githubusercontent.com/alireza0/s-ui/1.2.2/install.sh) 1.2.2" \
            --wait

          IP=$(doctl compute droplet list --format "PublicIPv4,Name" --no-header | grep "minidrop" | awk '{print $1}')
          echo "IP=$IP" >> $GITHUB_ENV
          
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="🏗️ 服务器创建中！IP: $IP。系统正在后台自动安装 s-ui，请在 1 分钟后尝试连接。"

      # --- 功能 4：【独立程序】仅针对 setup 任务的 SSH 逻辑 ---
      # 当你只想换库，不删服务器时用这个
      - name: Get IP for Setup
        if: github.event.client_payload.task == 'setup'
        run: |
          IP=$(doctl compute droplet list --format "PublicIPv4,Name" --no-header | grep "minidrop" | awk '{print $1}')
          echo "IP=$IP" >> $GITHUB_ENV

      - name: Setup Existing VPS
        if: github.event.client_payload.task == 'setup' && env.IP != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            printf "y\n\n\n\n" | bash <(curl -Ls https://raw.githubusercontent.com/alireza0/s-ui/1.2.2/install.sh) 1.2.2

      # --- 功能 5：统一同步数据库 (无论是 create 还是 setup 最后都跑这个) ---
      - name: Sync Database
        if: (github.event.client_payload.task == 'create' || github.event.client_payload.task == 'setup') && env.IP != ''
        run: |
          echo "等待 40 秒确保 SSH 服务在安装后稳定..."
          sleep 40
        
      - name: SCP DB
        if: (github.event.client_payload.task == 'create' || github.event.client_payload.task == 'setup') && env.IP != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "s-ui.db"
          target: "/root/"

      - name: Finalize
        if: (github.event.client_payload.task == 'create' || github.event.client_payload.task == 'setup') && env.IP != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            systemctl stop s-ui || true
            mkdir -p /usr/local/s-ui/db/ && cp /root/s-ui.db /usr/local/s-ui/db/s-ui.db
            mkdir -p /etc/s-ui/ && cp /root/s-ui.db /etc/s-ui/s-ui.db
            chmod 777 /usr/local/s-ui/db/s-ui.db
            systemctl restart s-ui
            echo "✅ 数据库同步完成"
