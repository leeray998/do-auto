name: DO_Control_Pipeline_V4

on:
  repository_dispatch:
    types: [do_action]

jobs:
  manage_droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      # --- 步骤 0：预检数据库文件 (防止再次出现 empty archive) ---
      - name: Check Database File
        run: |
          if [ -f "s-ui.db" ]; then
            echo "✅ 发现数据库文件，准备进行 Base64 编码..."
            echo "DB_EXISTS=true" >> $GITHUB_ENV
          else
            echo "❌ 错误：仓库根目录未发现 s-ui.db"
            exit 1
          fi

      # --- 功能 1：查询服务器清单 (保留) ---
      - name: List All Droplets
        if: github.event.client_payload.task == 'list'
        run: |
          LIST=$(doctl compute droplet list --format "Name,PublicIPv4,Status" --no-header)
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="📋 当前服务器清单：
            $LIST"

      # --- 功能 2：销毁服务器 (保留) ---
      - name: Destroy Droplet
        if: github.event.client_payload.task == 'delete'
        run: |
          ID=$(doctl compute droplet list --format "ID,Name" --no-header | grep "minidrop" | awk '{print $1}')
          if [ ! -z "$ID" ]; then
            doctl compute droplet delete $ID --force
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
              -d chat_id=${{ secrets.TG_CHAT_ID }} \
              -d text="✅ 已销毁 minidrop"
          fi

      # --- 功能 3：【全新思维】创建并全量注入 (解决 SSH 连接失败) ---
      - name: Create and Auto-Configure
        if: github.event.client_payload.task == 'create'
        run: |
          echo "🏗️ 正在读取并编码数据库..."
          DB_CONTENT=$(base64 -w 0 s-ui.db)
          SSH_ID=$(doctl compute ssh-key list --format ID --no-header | head -n 1)
          
          echo "🚀 正在创建服务器并注入 Cloud-Init..."
          doctl compute droplet create minidrop \
            --region sfo3 \
            --image ubuntu-24-04-x64 \
            --size s-1vcpu-512mb-10gb \
            --ssh-keys $SSH_ID \
            --user-data "#!/bin/bash
            # 1. 安装 s-ui
            printf 'y\n\n\n\n' | bash <(curl -Ls https://raw.githubusercontent.com/alireza0/s-ui/1.2.2/install.sh) 1.2.2
            # 2. 还原数据库 (直接从文本还原)
            mkdir -p /usr/local/s-ui/db/ && mkdir -p /etc/s-ui/
            echo '$DB_CONTENT' | base64 -d > /usr/local/s-ui/db/s-ui.db
            cp /usr/local/s-ui/db/s-ui.db /etc/s-ui/s-ui.db
            chmod 777 /usr/local/s-ui/db/s-ui.db
            # 3. 重启
            systemctl restart s-ui" \
            --wait

          IP=$(doctl compute droplet list --format "PublicIPv4,Name" --no-header | grep "minidrop" | awk '{print $1}')
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="🏗️ 服务器创建成功！IP: $IP。s-ui 已在后台自动安装并同步数据库，无需手动操作。"

      # --- 功能 4：针对 setup 任务的独立程序 (不删减) ---
      - name: Get IP for Setup
        if: github.event.client_payload.task == 'setup'
        run: |
          IP=$(doctl compute droplet list --format "PublicIPv4,Name" --no-header | grep "minidrop" | awk '{print $1}')
          echo "IP=$IP" >> $GITHUB_ENV

      - name: SSH Setup/Repair
        if: github.event.client_payload.task == 'setup' && env.IP != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          script: |
            echo "🔧 正在远程执行 setup 程序..."
            VERSION=1.2.2
            printf "y\n\n\n\n" | bash <(curl -Ls https://raw.githubusercontent.com/alireza0/s-ui/$VERSION/install.sh) $VERSION

      - name: SCP Database (仅用于 setup)
        if: github.event.client_payload.task == 'setup' && env.IP != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "s-ui.db"
          target: "/root/"

      - name: Finalize Setup
        if: github.event.client_payload.task == 'setup' && env.IP != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            systemctl stop s-ui || true
            mkdir -p /usr/local/s-ui/db/ && cp /root/s-ui.db /usr/local/s-ui/db/s-ui.db
            mkdir -p /etc/s-ui/ && cp /root/s-ui.db /etc/s-ui/s-ui.db
            chmod 777 /usr/local/s-ui/db/s-ui.db
            systemctl restart s-ui
            echo "🎉 数据库同步完成"
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
              -d chat_id=${{ secrets.TG_CHAT_ID }} \
              -d text="✅ Setup 任务完成，数据库已更新。"
