name: DO_Control_Pipeline_V2

on:
  repository_dispatch:
    types: [do_action]

jobs:
  manage_droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      # --- 功能 1：查询所有服务器并发送邮件 ---
      - name: List All Droplets IP
        if: github.event.client_payload.task == 'list'
        id: get_list
        run: |
          echo "🔎 正在抓取账号下所有服务器信息..."
          LIST=$(doctl compute droplet list --format "Name,PublicIPv4,Status" --no-header)
          echo "SERVER_LIST<<EOF" >> $GITHUB_ENV
          echo "$LIST" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send IP List to Email
        if: github.event.client_payload.task == 'list'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: beceleerichard@gmail.com
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: 📋 您当前的 DigitalOcean 服务器清单
          to: beceleerichard@gmail.com
          from: GitHub Actions
          body: |
            您好，以下是您账号下当前所有服务器的状态：
            
            ${{ env.SERVER_LIST }}
            
            -- 
            此邮件由您的 GitHub 自动化脚本发出。

      # --- 功能 2：销毁名为 minidrop 的服务器 ---
      - name: Destroy Droplet
        if: github.event.client_payload.task == 'delete'
        run: |
          ID=$(doctl compute droplet list --format "ID,Name" --no-header | grep "minidrop" | awk '{print $1}')
          if [ ! -z "$ID" ]; then
            doctl compute droplet delete $ID --force
            echo "✅ 已成功销毁 minidrop"
          else
            echo "❓ 未发现名为 minidrop 的服务器"
          fi

      # --- 功能 3：创建最小规格服务器 (512MB) ---
      - name: Create Droplet
        if: github.event.client_payload.task == 'create'
        run: |
          echo "🏗️ 正在创建 512MB 最小规格服务器..."
          SSH_ID=$(doctl compute ssh-key list --format ID --no-header | head -n 1)
          doctl compute droplet create minidrop \
            --region sfo3 \
            --image ubuntu-24-04-x64 \
            --size s-1vcpu-512mb-10gb \
            --ssh-keys $SSH_ID \
            --wait
          
          IP=$(doctl compute droplet list --format "PublicIPv4,Name" --no-header | grep "minidrop" | awk '{print $1}')
          echo "IP=$IP" >> $GITHUB_ENV

      # --- 功能 4：安装 s-ui 并同步数据库 ---
      - name: Install s-ui and Sync DB
        if: github.event.client_payload.task == 'create'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 15
            VERSION=1.2.2
            bash <(curl -Ls https://raw.githubusercontent.com/alireza0/s-ui/$VERSION/install.sh) $VERSION
            sleep 5

      - name: SCP Database to VPS
        if: github.event.client_payload.task == 'create'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "s-ui.db"
          target: "/root/"

      - name: Finalize s-ui
        if: github.event.client_payload.task == 'create'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            [ -d "/usr/local/s-ui/db/" ] && cp /root/s-ui.db /usr/local/s-ui/db/s-ui.db
            [ -d "/etc/s-ui/" ] && cp /root/s-ui.db /etc/s-ui/s-ui.db
            chmod 777 /usr/local/s-ui/db/s-ui.db
            systemctl restart s-ui
            echo "🎉 自动换库完成，节点已就绪！"
